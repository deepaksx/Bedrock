services:
  - type: web
    name: aws-billing-dashboard
    runtime: node
    rootDir: billing
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
